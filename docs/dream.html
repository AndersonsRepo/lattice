<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream — Lattice</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #c8c8d4;
      --text-dim: #6e6e82;
      --accent: #7c6fe0;
      --green: #4ade80;
      --amber: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Vignette ── */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(10,10,15,0.35) 70%,
        rgba(10,10,15,0.75) 100%);
      z-index: 2;
    }

    /* ── Top HUD ── */
    #hud-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,15,0.7) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .hud-left {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .hud-title {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .hud-title span { color: var(--accent); }

    .hud-piece-id {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      transition: opacity 0.8s ease;
    }

    .hud-right {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .badge {
      padding: 0.2rem 0.65rem;
      border-radius: 10px;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid currentColor;
      opacity: 0.75;
      transition: color 1s ease, border-color 1s ease, opacity 0.5s ease;
    }

    .score-badge {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--green);
      opacity: 0.7;
      transition: opacity 0.5s ease;
    }

    /* ── Poem overlay ── */
    #poem-overlay {
      position: fixed;
      bottom: 120px;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
      z-index: 10;
    }

    .poem-line {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-align: center;
      min-height: 1.2em;
      transition: opacity 1.5s ease;
    }

    .poem-line.visible { opacity: 1; }
    .poem-line.hidden  { opacity: 0; }

    /* ── Bottom HUD ── */
    #hud-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to top, rgba(10,10,15,0.7) 0%, transparent 100%);
      z-index: 10;
    }

    /* ── Wave progress bar ── */
    #wave-bar-wrap {
      position: absolute;
      bottom: 60px;
      left: 1.75rem;
      right: 1.75rem;
      height: 1px;
      background: rgba(255,255,255,0.04);
      border-radius: 1px;
      overflow: hidden;
    }

    #wave-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--accent), var(--green));
      border-radius: 1px;
      transition: width 0.1s linear;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
      line-height: 1;
    }

    .ctrl-btn:hover { color: var(--text); }

    .play-btn {
      font-size: 1.1rem;
      color: var(--text);
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speed-group {
      display: flex;
      gap: 0.15rem;
    }

    .speed-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .speed-btn:hover  { color: var(--text); border-color: var(--border); }
    .speed-btn.active { color: var(--accent); border-color: var(--accent); }

    .ctrl-sep {
      width: 1px;
      height: 14px;
      background: var(--border);
    }

    #piece-counter {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      min-width: 6ch;
    }

    /* ── Back link ── */
    #back-btn {
      text-decoration: none;
      font-family: inherit;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    #back-btn:hover { color: var(--text); }

    /* ── Start overlay ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.92);
      z-index: 30;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #start-overlay h2 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(124,111,224,0.4);
      margin-bottom: 0.4rem;
    }

    #start-overlay .tagline {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }

    #start-overlay .start-hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: pulse-text 2.5s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* ── Loading state ── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 40;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="vignette"></div>

<!-- Top HUD -->
<div id="hud-top">
  <div class="hud-left">
    <div class="hud-title">lattice / <span>dream</span></div>
    <div class="hud-piece-id" id="piece-id">—</div>
  </div>
  <div class="hud-right">
    <div class="badge" id="badge-type" style="color: var(--accent); border-color: var(--accent);">—</div>
    <div class="score-badge" id="badge-score">—</div>
  </div>
</div>

<!-- Poem -->
<div id="poem-overlay">
  <div class="poem-line hidden" id="poem-l0"></div>
  <div class="poem-line hidden" id="poem-l1"></div>
  <div class="poem-line hidden" id="poem-l2"></div>
</div>

<!-- Wave progress bar -->
<div id="wave-bar-wrap"><div id="wave-bar"></div></div>

<!-- Bottom HUD -->
<div id="hud-bottom">
  <a id="back-btn" href="index.html">← back</a>

  <div id="controls">
    <div class="speed-group">
      <button class="speed-btn" data-speed="0.5">½×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
    </div>

    <div class="ctrl-sep"></div>

    <button class="ctrl-btn play-btn" id="pause-btn" title="Space">⏸</button>
    <button class="ctrl-btn" id="skip-btn" title="→">⏭</button>
  </div>

  <div id="piece-counter">— / —</div>
</div>

<!-- Start overlay -->
<div id="start-overlay">
  <h2>dream</h2>
  <div class="tagline">the space between pieces</div>
  <div class="start-hint">click to begin</div>
</div>

<!-- Loading -->
<div id="loading">loading archive…</div>

<script>
// ─── Color themes ─────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  '1d':                 { colors: ['#0a0a0f','#1a1a3e','#3b2d8b','#6b4edb','#9d7af5','#c8abff','#e8d8ff','#ffffff'] },
  '2d':                 { colors: ['#0a0a0f','#0d2818','#166b3a','#22a95c','#4ade80','#7af5a8','#b8ffd4','#e8fff0'] },
  'lsystem':            { colors: ['#0a0a0f','#2d1a0a','#6b3a0d','#a85c16','#db8b22','#f5b84a','#ffe088','#fff4cc'] },
  'reaction-diffusion': { colors: ['#0a0a0f','#1a0a2d','#3b0d6b','#6b16a8','#a822db','#d44af5','#f088ff','#ffccff'] },
  'voronoi':            { colors: ['#0a0a0f','#0a1a2d','#0d3b6b','#166ba8','#22a8db','#4ad4f5','#88eeff','#ccf8ff'] },
  'wfc':                { colors: ['#0a0a0f','#2d0a0a','#6b0d1a','#a8163b','#db226b','#f54a9d','#ff88c8','#ffccee'] },
  'spirograph':         { colors: ['#0a0a0f','#1a2d0a','#3b6b0d','#6ba816','#a8db22','#d4f54a','#eeff88','#ffffcc'] },
  'attractor':          { colors: ['#0a0a0f','#2d1a1a','#6b2d2d','#a84a3b','#db6b4a','#f59d6b','#ffc8a0','#ffe8d8'] },
  'julia':              { colors: ['#0a0a0f','#0a2d2d','#0d6b5b','#16a88a','#22dbb5','#4af5d4','#88ffe8','#ccfff4'] },
  'noise':              { colors: ['#0a0a0f','#1a1a0a','#3b3b0d','#6b6b16','#a8a822','#d4d44a','#eeff88','#ffffcc'] },
  'flowfield':          { colors: ['#0a0a0f','#0a1a1a','#0d3b3b','#166b6b','#22a8a8','#4ad4d4','#88eeff','#ccffff'] },
};

const TYPE_LABELS = {
  '1d': '1D Automaton', '2d': '2D Life-like', 'lsystem': 'L-System',
  'reaction-diffusion': 'Reaction-Diffusion', 'voronoi': 'Voronoi',
  'wfc': 'Wave Function Collapse', 'spirograph': 'Spirograph',
  'attractor': 'Strange Attractor', 'julia': 'Julia Set',
  'noise': 'Fractal Noise', 'flowfield': 'Flow Field',
};

// ─── Haiku banks ──────────────────────────────────────────────────────────────
// Three banks: each is an array of short lines
// Line 1 — the visual quality of the incoming piece
// Line 2 — its evolutionary origin / process
// Line 3 — what it leaves behind (ephemeral quality)
const BANK1 = {
  // density
  dense_sym:    ['filled and perfectly still',  'every cell decided yes',       'dense and orderly'],
  dense_asym:   ['full without a seam',          'abundance without reflection',  'heavy and alive'],
  sparse_sym:   ['rare marks, balanced field',   'sparse but mirrored',           'emptiness as axis'],
  sparse_asym:  ['mostly open space here',       'few marks, no axis to fold on', 'wide and ungoverned'],
  mid:          ['some cells chosen, some left', 'the middle ground of structure', 'neither full nor empty'],
};

const BANK2 = {
  // generation / origin
  early:        'first attempts at form',
  midlife:      'shaped through many mutations',
  late:         'late refinement of the line',
  novel:        'a form the archive had not seen',
  familiar:     'echoing what came before',
};

const BANK3 = {
  // edge / kinetic quality
  turbulent:    ['alive at every margin',     'friction made the border glow', 'energy at the rim'],
  calm:         ['still where structure ends', 'the edges held their peace',    'rest at the limit'],
  complex:      ['depth at every scale',       'no bottom to its detail',       'worlds within worlds'],
  simple:       ['a single clear voice',       'honest and without reserve',    'one note held long'],
};

function seededPick(arr, seed) {
  return arr[((seed * 1664525 + 1013904223) >>> 0) % arr.length];
}

function generateHaiku(piece) {
  const m = piece.metrics;
  const seed = (piece.genome.seed || 1) >>> 0;

  // Line 1: density × symmetry
  let l1;
  if (m.density > 0.68 && m.symmetry > 0.55)      l1 = seededPick(BANK1.dense_sym,   seed);
  else if (m.density > 0.68)                         l1 = seededPick(BANK1.dense_asym,  seed);
  else if (m.density < 0.42 && m.symmetry > 0.55)   l1 = seededPick(BANK1.sparse_sym,  seed);
  else if (m.density < 0.42)                         l1 = seededPick(BANK1.sparse_asym, seed);
  else                                                l1 = seededPick(BANK1.mid,         seed);

  // Line 2: generation + novelty
  let l2;
  if (m.novelty >= 0.95)                     l2 = BANK2.novel;
  else if (m.novelty < 0.3)                  l2 = BANK2.familiar;
  else if (piece.generation <= 15)           l2 = BANK2.early;
  else if (piece.generation >= 80)           l2 = BANK2.late;
  else                                        l2 = BANK2.midlife;

  // Line 3: edge activity × fractal complexity
  let l3;
  if (m.edgeActivity > 0.62)                 l3 = seededPick(BANK3.turbulent, seed ^ 0xABCD);
  else if (m.fractalDimension > 1.8)         l3 = seededPick(BANK3.complex,   seed ^ 0x1234);
  else if (m.edgeActivity < 0.3)             l3 = seededPick(BANK3.calm,      seed ^ 0x5678);
  else                                        l3 = seededPick(BANK3.simple,    seed ^ 0x9ABC);

  return [l1, l2, l3];
}

// ─── Color helpers ────────────────────────────────────────────────────────────
function parseHex(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function hexLerp(a, b, t) {
  const [ar,ag,ab] = parseHex(a);
  const [br,bg,bb] = parseHex(b);
  const r = Math.round(ar + (br-ar)*t);
  const g = Math.round(ag + (bg-ag)*t);
  const bl= Math.round(ab + (bb-ab)*t);
  return `rgb(${r},${g},${bl})`;
}

function blendToWhite(hex, t) {
  const [r,g,b] = parseHex(hex);
  const wr = Math.round(r + (255-r)*t);
  const wg = Math.round(g + (255-g)*t);
  const wb = Math.round(b + (255-b)*t);
  return `rgb(${wr},${wg},${wb})`;
}

function cellColor(gridVal, maxVal, theme) {
  const normalized = maxVal > 0 ? gridVal / maxVal : 0;
  const idx = Math.min(7, Math.round(normalized * 7));
  return theme.colors[idx];
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth  * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── State ────────────────────────────────────────────────────────────────────
let pieces   = [];
let fromIdx  = 0;
let toIdx    = 1;
let phase    = 'hold';   // 'morphing' | 'hold'
let morphProg = 0;       // 0 → 1 during morphing
let holdElapsed = 0;     // ms
let breatheT = 0;        // seconds, drives breathing during hold
let speed    = 1;
let paused   = false;
let started  = false;

const MORPH_DURATION = 9000; // ms at 1×
const HOLD_DURATION  = 2800; // ms

// Wave
let waveAngle = 0;       // radians, direction of wave sweep
const WAVE_ANGLES = [0, Math.PI/6, -Math.PI/6, Math.PI/4, -Math.PI/4,
                     Math.PI/3, -Math.PI/3, Math.PI/2];

// Haiku display state
let poemLines   = ['','',''];
let poemReveal  = [0, 0, 0]; // how many chars revealed per line
let poemVisible = false;
let poemFadeOut = false;
let poemTimer   = 0;

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
let droneOsc  = null;
let droneGain = null;
let lfoOsc    = null;

function initAudio() {
  try {
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    droneOsc  = audioCtx.createOscillator();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55;

    lfoOsc = audioCtx.createOscillator();
    lfoOsc.type = 'sine';
    lfoOsc.frequency.value = 0.12; // very slow tremolo

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 3.5; // ±3.5 Hz FM

    lfoOsc.connect(lfoGain);
    lfoGain.connect(droneOsc.frequency);

    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 180;
    lpf.Q.value = 0.8;

    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0;

    droneOsc.connect(lpf);
    lpf.connect(droneGain);
    droneGain.connect(audioCtx.destination);

    droneOsc.start();
    lfoOsc.start();

    // Fade in
    droneGain.gain.setTargetAtTime(0.04, audioCtx.currentTime, 2.0);
  } catch(e) { /* audio not available */ }
}

function setDroneTarget(piece) {
  if (!droneOsc || !audioCtx) return;
  // Score 0.72–0.80 → freq 44–58 Hz (A0–A#1 range, deep and meditative)
  const freq = 38 + (piece.score - 0.70) * 160;
  droneOsc.frequency.cancelScheduledValues(audioCtx.currentTime);
  droneOsc.frequency.setTargetAtTime(Math.max(28, Math.min(80, freq)),
    audioCtx.currentTime, 4.5); // slow drift over 4.5s
}

// ─── Wave helpers ─────────────────────────────────────────────────────────────
function cellWaveCoord(r, c, rows, cols) {
  // Map cell to 0..1 space
  const nx = cols > 1 ? c / (cols - 1) : 0.5;
  const ny = rows > 1 ? r / (rows - 1) : 0.5;

  // Project onto wave direction
  const wx = Math.cos(waveAngle);
  const wy = Math.sin(waveAngle);
  const proj = nx * wx + ny * wy;

  // Normalize to 0..1 given the grid's corner projections
  const corners = [0*wx+0*wy, 1*wx+0*wy, 0*wx+1*wy, 1*wx+1*wy];
  const minP = Math.min(...corners);
  const maxP = Math.max(...corners);
  return maxP > minP ? (proj - minP) / (maxP - minP) : 0;
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function computeLayout(piece) {
  const cols  = piece.genome.width;
  const rows  = piece.genome.height;
  const padV  = 100 * devicePixelRatio;
  const padH  = 80  * devicePixelRatio;
  const availW = canvas.width  - padH * 2;
  const availH = canvas.height - padV * 2;
  const cellW = Math.min(availW / cols, availH / rows);
  const cellH = cellW;
  const totalW = cols * cellW;
  const totalH = rows * cellH;
  const ox = (canvas.width  - totalW) / 2;
  const oy = (canvas.height - totalH) / 2;
  const gap = cellW > 6 ? 1.5 : cellW > 3 ? 1 : 0.5;
  const maxVal = (piece.genome.palette?.length ?? 8) - 1;
  return { cols, rows, cellW, cellH, ox, oy, gap, maxVal };
}

// Draw a piece as a static mosaic (alpha control via ctx globalAlpha)
function drawMosaic(piece, brightnessBoost) {
  const layout = computeLayout(piece);
  const theme  = TYPE_COLORS[piece.genome.type] || TYPE_COLORS['2d'];
  const { cols, rows, cellW, cellH, ox, oy, gap, maxVal } = layout;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const v   = piece.grid?.[r]?.[c] ?? 0;
      let color = cellColor(v, maxVal, theme);
      if (brightnessBoost && brightnessBoost !== 1) {
        // slightly brighten during breathing
        const t = (brightnessBoost - 1) * 6; // tiny boost
        if (t > 0) color = blendToWhite(color, t * 0.08);
      }
      ctx.fillStyle = color;
      ctx.fillRect(
        ox + c * cellW + gap,
        oy + r * cellH + gap,
        cellW - 2 * gap,
        cellH - 2 * gap
      );
    }
  }
}

// Draw morphing state: wave sweeps from `from` to `to`
function drawMorph(from, to, progress) {
  // Use `to` layout as reference (determines cell size)
  const layout = computeLayout(to);
  const fromTheme = TYPE_COLORS[from.genome.type] || TYPE_COLORS['2d'];
  const toTheme   = TYPE_COLORS[to.genome.type]   || TYPE_COLORS['2d'];
  const { cols, rows, cellW, cellH, ox, oy, gap } = layout;

  const fromMaxVal = (from.genome.palette?.length ?? 8) - 1;
  const toMaxVal   = (to.genome.palette?.length   ?? 8) - 1;

  // Wave sweep: front takes 75% of morphProgress
  // Each cell transition (flash + resolve) occupies 15% of morphProgress
  const WAVE_END   = 0.78;
  const FLASH_SPAN = 0.12;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const wCoord    = cellWaveCoord(r, c, rows, cols);
      // When wave arrives at this cell (0 → WAVE_END)
      const arrivalAt = wCoord * WAVE_END;
      // Local progress for this cell: 0 before arrival, ramps up after
      const localP    = Math.max(0, Math.min(1,
        (progress - arrivalAt) / FLASH_SPAN));

      let color;

      if (localP <= 0) {
        // Pre-wave: original piece
        const fR = Math.min(r, from.genome.height - 1);
        const fC = Math.min(c, from.genome.width  - 1);
        const v  = from.grid?.[fR]?.[fC] ?? 0;
        color = cellColor(v, fromMaxVal, fromTheme);

      } else if (localP < 0.45) {
        // Flash front: bright spark as wave arrives
        const flashT = localP / 0.45; // 0→1 during flash
        const fR = Math.min(r, from.genome.height - 1);
        const fC = Math.min(c, from.genome.width  - 1);
        const v  = from.grid?.[fR]?.[fC] ?? 0;
        const base = cellColor(v, fromMaxVal, fromTheme);
        // Flash: ramp up to white and back down, but "down" lands at to-color
        const sparkAmt = Math.sin(flashT * Math.PI) * 0.9;
        color = blendToWhite(base, sparkAmt);

      } else {
        // Post-wave: new piece
        const v = to.grid?.[r]?.[c] ?? 0;
        color = cellColor(v, toMaxVal, toTheme);
      }

      ctx.fillStyle = color;
      ctx.fillRect(
        ox + c * cellW + gap,
        oy + r * cellH + gap,
        cellW - 2 * gap,
        cellH - 2 * gap
      );
    }
  }
}

// ─── Render loop ──────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!pieces.length) return;

  if (phase === 'hold') {
    // Subtle breathing during hold (brightness sine, period 5s)
    const boost = 1 + Math.sin(breatheT * Math.PI * 2 / 5) * 0.04;
    drawMosaic(pieces[toIdx], boost);
  } else {
    drawMorph(pieces[fromIdx], pieces[toIdx], morphProg);
  }
}

// ─── Poem display ─────────────────────────────────────────────────────────────
const poemEls = [
  document.getElementById('poem-l0'),
  document.getElementById('poem-l1'),
  document.getElementById('poem-l2'),
];

function startPoem(piece) {
  poemLines  = generateHaiku(piece);
  poemReveal = [0, 0, 0];
  poemVisible = true;
  poemFadeOut = false;
  poemTimer   = 0;
  poemEls.forEach(el => { el.textContent = ''; el.classList.remove('visible','hidden'); el.classList.add('hidden'); });
}

function updatePoem(dt) {
  if (!poemVisible) return;
  poemTimer += dt;

  // Reveal line 0 at t=0.8s, line 1 at t=1.8s, line 2 at t=2.8s
  const delays   = [800, 1800, 2800];
  const charRate = 40; // ms per character

  for (let i = 0; i < 3; i++) {
    const t = poemTimer - delays[i];
    if (t < 0) continue;
    const targetChars = Math.floor(t / charRate);
    const line = poemLines[i];
    const chars = Math.min(targetChars, line.length);
    if (chars !== poemReveal[i]) {
      poemReveal[i] = chars;
      poemEls[i].textContent = line.slice(0, chars);
      poemEls[i].classList.remove('hidden');
      poemEls[i].classList.add('visible');
    }
    // Ensure final state
    if (chars >= line.length && poemEls[i].textContent !== line) {
      poemEls[i].textContent = line;
    }
  }

  // Fade out during hold: start fading at hold 1.2s
  if (poemFadeOut) {
    poemEls.forEach(el => {
      el.classList.remove('visible');
      el.classList.add('hidden');
    });
    // Don't reset until next startPoem
  }
}

// ─── HUD updates ──────────────────────────────────────────────────────────────
function updateHUD(piece) {
  const type      = piece.genome.type;
  const label     = TYPE_LABELS[type] || type;
  const theme     = TYPE_COLORS[type] || TYPE_COLORS['2d'];
  const accentCol = theme.colors[5];

  document.getElementById('piece-id').textContent   = piece.id;
  document.getElementById('badge-type').textContent = label;
  document.getElementById('badge-type').style.color = accentCol;
  document.getElementById('badge-type').style.borderColor = accentCol;
  document.getElementById('badge-score').textContent = `score ${(piece.score * 100).toFixed(1)}`;
  document.getElementById('piece-counter').textContent =
    `${(toIdx + 1).toString().padStart(2,' ')} / ${pieces.length}`;
}

const waveBarEl = document.getElementById('wave-bar');

// ─── Morph control ────────────────────────────────────────────────────────────
function startMorph() {
  fromIdx  = toIdx;
  toIdx    = (toIdx + 1) % pieces.length;
  waveAngle = WAVE_ANGLES[Math.floor(Math.random() * WAVE_ANGLES.length)];
  morphProg = 0;
  phase     = 'morphing';

  updateHUD(pieces[toIdx]);
  startPoem(pieces[toIdx]);
  setDroneTarget(pieces[toIdx]);
}

function skipToNext() {
  poemFadeOut = true;
  if (phase === 'morphing') {
    // Jump to hold with new piece
    morphProg = 1;
    phase = 'hold';
    holdElapsed = 0;
  } else {
    startMorph();
  }
}

// ─── Main update ─────────────────────────────────────────────────────────────
let lastTs = null;

function tick(ts) {
  if (!started) { requestAnimationFrame(tick); return; }

  const rawDt = lastTs === null ? 16 : ts - lastTs;
  lastTs = ts;
  const dt = paused ? 0 : Math.min(rawDt, 100); // cap dt to avoid huge jumps

  if (phase === 'morphing') {
    morphProg += (dt / MORPH_DURATION) * speed;
    waveBarEl.style.width = `${Math.min(100, morphProg * 100)}%`;

    if (morphProg >= 1) {
      morphProg   = 1;
      phase       = 'hold';
      holdElapsed = 0;
      breatheT    = 0;
      // Trigger poem fade-out slightly after hold begins
      setTimeout(() => { poemFadeOut = true; }, 600);
    }
  } else {
    holdElapsed += dt * speed;
    breatheT    += dt / 1000;
    waveBarEl.style.width = '0%';

    if (holdElapsed >= HOLD_DURATION) {
      startMorph();
    }
  }

  updatePoem(dt);
  render();
  requestAnimationFrame(tick);
}

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  const res  = await fetch('gallery.json');
  const data = await res.json();

  pieces = data.hallOfFame || [];
  if (!pieces.length) {
    document.getElementById('loading').textContent = 'no pieces found';
    return;
  }

  // Sort by generation (ascending) for a temporal journey
  pieces.sort((a, b) => a.generation - b.generation);

  document.getElementById('loading').style.display = 'none';

  // Prime the first HUD with piece[0] → piece[1]
  toIdx   = 0;
  fromIdx = pieces.length - 1;
  updateHUD(pieces[toIdx]);
  render();

  // Show start overlay
  document.getElementById('start-overlay').style.display = 'flex';
}

// ─── Event handlers ───────────────────────────────────────────────────────────
document.getElementById('start-overlay').addEventListener('click', () => {
  document.getElementById('start-overlay').style.display = 'none';
  initAudio();

  // Initialize morph state
  fromIdx   = pieces.length - 1;
  toIdx     = 0;
  phase     = 'hold';
  holdElapsed = 0;
  breatheT  = 0;
  waveAngle = WAVE_ANGLES[0];

  updateHUD(pieces[toIdx]);
  startPoem(pieces[toIdx]);
  if (pieces[toIdx]) setDroneTarget(pieces[toIdx]);

  started = true;
  lastTs  = null;
  requestAnimationFrame(tick);
});

document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
});

document.getElementById('skip-btn').addEventListener('click', skipToNext);

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.addEventListener('keydown', e => {
  if (!started) return;
  if (e.code === 'Space') {
    e.preventDefault();
    document.getElementById('pause-btn').click();
  } else if (e.code === 'ArrowRight') {
    skipToNext();
  } else if (e.code === 'ArrowLeft') {
    // Step back
    toIdx   = (toIdx - 2 + pieces.length) % pieces.length;
    fromIdx = (toIdx - 1 + pieces.length) % pieces.length;
    phase   = 'hold';
    holdElapsed = 0;
    breatheT = 0;
    poemFadeOut = true;
    updateHUD(pieces[toIdx]);
    render();
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('loading').textContent = 'failed to load';
  console.error(err);
});
</script>
