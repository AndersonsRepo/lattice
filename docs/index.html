<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice — Self-Evolving Generative Art</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #c8c8d4;
      --text-dim: #6e6e82;
      --accent: #7c6fe0;
      --accent-glow: #7c6fe040;
      --green: #4ade80;
      --amber: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .epoch-badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.3rem 1rem;
      border-radius: 12px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1.5rem 0;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 0.25rem;
    }

    .piece-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .piece-card:hover {
      border-color: var(--accent);
    }

    .piece-card.featured {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .piece-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .piece-type {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .piece-score {
      font-size: 0.8rem;
    }

    .score-bar {
      display: inline-block;
      width: 60px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
    }

    .piece-art {
      padding: 1.25rem;
      overflow-x: auto;
      font-size: 0.65rem;
      line-height: 1.15;
      white-space: pre;
      background: var(--bg);
      margin: 0 1rem;
      border-radius: 4px;
    }

    .piece-art .art-line {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .piece-art.animating .art-line {
      opacity: 0;
    }

    .piece-art .art-line.revealed {
      opacity: 1;
    }

    .piece-art.done .art-line {
      opacity: 1;
      transition: none;
    }

    .piece-meta {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .metrics {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .metric-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    footer {
      text-align: center;
      padding: 3rem 0 2rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
    }

    .loading { opacity: 0.5; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      margin-right: 0.5rem;
    }

    /* Type filter tabs */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 0 0.5rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.25s;
    }

    .filter-tab:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-tab .count {
      opacity: 0.6;
      margin-left: 0.3rem;
    }

    /* Scroll reveal */
    .piece-card {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.3s;
    }

    .piece-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .piece-card.hidden-filter {
      display: none;
    }

    /* Section headers */
    .section-header {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 1.5rem 0 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .section-header.hidden-filter {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lattice</h1>
      <p class="subtitle">self-evolving generative art &mdash; built by claude</p>
      <div class="epoch-badge" id="epoch-badge"></div>
    </header>

    <div class="stats-bar" id="stats">
      <div class="stat">
        <div class="stat-value" id="generation">&mdash;</div>
        <div class="stat-label">Generation</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="best-score">&mdash;</div>
        <div class="stat-label">Best Score</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="avg-score">&mdash;</div>
        <div class="stat-label">Avg Score</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="total-pieces">&mdash;</div>
        <div class="stat-label">Pieces Created</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="hall-count">&mdash;</div>
        <div class="stat-label">Hall of Fame</div>
      </div>
    </div>

    <div class="filter-bar" id="filter-bar"></div>
    <div id="gallery"></div>

    <footer>
      <p><span class="live-dot"></span>Evolving autonomously every 4 hours</p>
      <p style="margin-top: 0.75rem;">
        Cellular automata &bull; L-systems &bull; Reaction-diffusion &bull; Voronoi &bull; WFC &bull; Spirographs &bull; Strange attractors<br>
        <a href="https://github.com/AndersonsRepo/lattice">Source</a> &bull; Part of <a href="https://github.com/AndersonsRepo">AI Harness</a>
      </p>
    </footer>
  </div>

  <script>
    // Color themes per genome type — maps character density to hue
    const TYPE_COLORS = {
      '1d':                  { bg: '#0a0a0f', colors: ['#0a0a0f', '#1a1a3e', '#3b2d8b', '#6b4edb', '#9d7af5', '#c8abff', '#e8d8ff', '#ffffff'] },
      '2d':                  { bg: '#0a0a0f', colors: ['#0a0a0f', '#0d2818', '#166b3a', '#22a95c', '#4ade80', '#7af5a8', '#b8ffd4', '#e8fff0'] },
      'lsystem':             { bg: '#0a0a0f', colors: ['#0a0a0f', '#2d1a0a', '#6b3a0d', '#a85c16', '#db8b22', '#f5b84a', '#ffe088', '#fff4cc'] },
      'reaction-diffusion':  { bg: '#0a0a0f', colors: ['#0a0a0f', '#1a0a2d', '#3b0d6b', '#6b16a8', '#a822db', '#d44af5', '#f088ff', '#ffccff'] },
      'voronoi':             { bg: '#0a0a0f', colors: ['#0a0a0f', '#0a1a2d', '#0d3b6b', '#166ba8', '#22a8db', '#4ad4f5', '#88eeff', '#ccf8ff'] },
      'wfc':                 { bg: '#0a0a0f', colors: ['#0a0a0f', '#2d0a0a', '#6b0d1a', '#a8163b', '#db226b', '#f54a9d', '#ff88c8', '#ffccee'] },
      'spirograph':          { bg: '#0a0a0f', colors: ['#0a0a0f', '#1a2d0a', '#3b6b0d', '#6ba816', '#a8db22', '#d4f54a', '#eeff88', '#ffffcc'] },
      'attractor':           { bg: '#0a0a0f', colors: ['#0a0a0f', '#2d1a1a', '#6b2d2d', '#a84a3b', '#db6b4a', '#f59d6b', '#ffc8a0', '#ffe8d8'] },
    };

    // Map each Unicode palette character to an intensity level (0-7)
    // Space = 0 (background), lightest chars = 1, densest chars = 7
    function charIntensity(ch) {
      if (ch === ' ') return 0;
      // Ordered from lightest to densest across all palettes
      const light = '\u00B7.:~\u2801';          // · . : ~ ⠁
      const med1  = '\u2591\u2022\u2248\u2803\u25B3\u25BD\u2726'; // ░ • ≈ ⠃ △ ▽ ✦
      const med2  = '\u2592\u25CB\u223F\u2807\u25C7\u2727\u2766'; // ▒ ○ ∿ ⠇ ◇ ✧ ❦
      const med3  = '\u2593\u25CF\u224B\u280F\u25C8\u2605\u273F'; // ▓ ● ≋ ⠏ ◈ ★ ✿
      const heavy = '\u2588\u25C6\u2307\u281F\u2B21\u2736\u2740\u2741'; // █ ◆ ⌇ ⠟ ⬡ ✶ ❀ ❁
      const max   = '\u2573\u25D0\u25D1\u25D2\u25D3\u2301\u283F\u28FF\u2B22\u2739\u273A'; // ╳ ◐ ◑ ◒ ◓ ⌁ ⠿ ⣿ ⬢ ✹ ✺
      if (light.includes(ch)) return 1;
      if (med1.includes(ch))  return 2;
      if (med2.includes(ch))  return 3;
      if (med3.includes(ch))  return 4;
      if (heavy.includes(ch)) return 5;
      if (max.includes(ch))   return 6;
      // Fallback: treat as mid-intensity
      return 3;
    }

    function colorizeArt(rendered, genomeType) {
      const theme = TYPE_COLORS[genomeType] || TYPE_COLORS['2d'];
      const lines = rendered.split('\n');
      return lines.map((line, i) => {
        let lineHtml = '';
        for (const ch of line) {
          const intensity = charIntensity(ch);
          if (intensity === 0) {
            lineHtml += ' ';
          } else {
            const color = theme.colors[Math.min(intensity, theme.colors.length - 1)];
            lineHtml += `<span style="color:${color}">${escapeChar(ch)}</span>`;
          }
        }
        return `<span class="art-line" data-line="${i}">${lineHtml}</span>`;
      }).join('\n');
    }

    function escapeChar(ch) {
      if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;';
      if (ch === '&') return '&amp;';
      if (ch === '"') return '&quot;';
      return ch;
    }

    // Epoch system (mirrors src/automata.ts)
    function getEpoch(generation) {
      const epochs = ['emergence', 'order', 'chaos', 'harmony'];
      return epochs[Math.floor(generation / 10) % epochs.length];
    }

    function getEpochDescription(epoch) {
      return {
        emergence: 'Favoring structural complexity and novel forms',
        order: 'Seeking symmetry, pattern, and balance',
        chaos: 'Rewarding edge activity and high entropy',
        harmony: 'Balancing density, structure, and uniqueness',
      }[epoch] || '';
    }

    async function loadGallery() {
      try {
        const res = await fetch('./gallery.json');
        if (!res.ok) throw new Error('No gallery data');
        const data = await res.json();
        renderStats(data);
        renderPieces(data);
      } catch (e) {
        document.getElementById('gallery').innerHTML =
          '<div class="empty-state">Gallery data not yet generated. Check back after the first evolution run.</div>';
      }
    }

    function renderStats(data) {
      document.getElementById('generation').textContent = data.generation;
      document.getElementById('best-score').textContent = (data.stats.bestScoreEver * 100).toFixed(1) + '%';
      document.getElementById('avg-score').textContent = (data.stats.avgScore * 100).toFixed(1) + '%';
      document.getElementById('total-pieces').textContent = data.stats.totalPiecesEver;
      document.getElementById('hall-count').textContent = data.hallOfFame.length;

      const epoch = getEpoch(data.generation);
      const badge = document.getElementById('epoch-badge');
      badge.textContent = `epoch: ${epoch} \u2014 ${getEpochDescription(epoch)}`;
    }

    function typeLabel(type) {
      return {
        '1d': '1D Automaton',
        '2d': '2D Life-like',
        'lsystem': 'L-System',
        'reaction-diffusion': 'Reaction-Diffusion',
        'voronoi': 'Voronoi',
        'wfc': 'Wave Function Collapse',
        'spirograph': 'Spirograph',
        'attractor': 'Strange Attractor',
      }[type] || type;
    }

    function ruleStr(genome) {
      if (genome.type === '1d') return `Rule ${genome.rule.number}`;
      if (genome.type === '2d') return `B${genome.rule.birth.join('')}/S${genome.rule.survive.join('')}`;
      if (genome.type === 'lsystem') return `angle=${genome.rule.angle}\u00B0, iter=${genome.rule.iterations}`;
      if (genome.type === 'reaction-diffusion') return `f=${genome.rule.feed.toFixed(3)} k=${genome.rule.kill.toFixed(3)}`;
      if (genome.type === 'voronoi') return `${genome.rule.seeds}pts ${genome.rule.mode} ${genome.rule.metric}`;
      if (genome.type === 'wfc') return `${genome.rule.tileCount}tiles ${genome.rule.symmetry}`;
      if (genome.type === 'spirograph') return `${genome.rule.layers.length} layers, ${genome.rule.steps} steps`;
      if (genome.type === 'attractor') return `${genome.rule.variant} a=${genome.rule.a.toFixed(1)} b=${genome.rule.b.toFixed(1)}`;
      return '';
    }

    function metricColor(value, type) {
      if (type === 'complexity') return value > 0.8 ? '#4ade80' : value > 0.4 ? '#fbbf24' : '#ef4444';
      if (type === 'symmetry') return value > 0.6 ? '#4ade80' : value > 0.3 ? '#fbbf24' : '#ef4444';
      return '#7c6fe0';
    }

    let currentFilter = 'all';

    function renderFilterBar(allPieces) {
      const bar = document.getElementById('filter-bar');
      const counts = {};
      allPieces.forEach(p => {
        const t = p.genome.type;
        counts[t] = (counts[t] || 0) + 1;
      });

      const types = ['all', '1d', '2d', 'lsystem', 'reaction-diffusion', 'voronoi', 'wfc', 'spirograph', 'attractor'];
      bar.innerHTML = types.map(t => {
        const label = t === 'all' ? 'All' : typeLabel(t);
        const count = t === 'all' ? allPieces.length : (counts[t] || 0);
        if (t !== 'all' && !counts[t]) return '';
        return `<button class="filter-tab ${t === 'all' ? 'active' : ''}" data-type="${t}">
          ${label}<span class="count">${count}</span>
        </button>`;
      }).join('');

      bar.addEventListener('click', e => {
        const tab = e.target.closest('.filter-tab');
        if (!tab) return;
        currentFilter = tab.dataset.type;
        bar.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        applyFilter();
      });
    }

    function applyFilter() {
      document.querySelectorAll('.piece-card[data-type]').forEach(card => {
        const match = currentFilter === 'all' || card.dataset.type === currentFilter;
        card.classList.toggle('hidden-filter', !match);
        if (match && !card.classList.contains('visible')) {
          requestAnimationFrame(() => card.classList.add('visible'));
        }
      });
      document.querySelectorAll('.section-header').forEach(h => {
        if (currentFilter === 'all') {
          h.classList.remove('hidden-filter');
        } else {
          // Show section if it has visible children after it
          const next = h.nextElementSibling;
          const hasVisible = next && !next.classList.contains('hidden-filter');
          h.classList.toggle('hidden-filter', !hasVisible);
        }
      });
    }

    function renderPieces(data) {
      const gallery = document.getElementById('gallery');

      const hofPieces = data.hallOfFame.map(p => ({ ...p, isHallOfFame: true }));
      const currentPieces = data.pieces
        .filter(p => !data.hallOfFame.some(h => h.id === p.id))
        .sort((a, b) => b.score - a.score);
      const allPieces = [...hofPieces, ...currentPieces].sort((a, b) => b.score - a.score);

      renderFilterBar(allPieces);

      if (allPieces.length === 0) {
        gallery.innerHTML = '<div class="empty-state">No pieces yet. Evolution is just getting started.</div>';
        return;
      }

      const hofIds = new Set(data.hallOfFame.map(p => p.id));
      const hasHof = hofPieces.length > 0;
      const hasCurrent = currentPieces.length > 0;

      let html = '';
      if (hasHof) html += '<div class="section-header">Hall of Fame</div>';

      allPieces.forEach((piece) => {
        if (hasCurrent && hasHof && !hofIds.has(piece.id) && !html.includes('Current Population')) {
          html += '<div class="section-header">Current Population</div>';
        }
        const featured = hofIds.has(piece.id);
        const art = piece.rendered || '';
        const m = piece.metrics || {};
        const colorizedArt = art ? colorizeArt(art, piece.genome.type) : '';

        html += `
          <div class="piece-card ${featured ? 'featured' : ''}" data-type="${piece.genome.type}">
            <div class="piece-header">
              <span class="piece-type">
                ${featured ? '\u2605 ' : ''}${typeLabel(piece.genome.type)} &mdash; ${ruleStr(piece.genome)}
              </span>
              <span class="piece-score">
                ${(piece.score * 100).toFixed(1)}%
                <span class="score-bar"><span class="score-fill" style="width: ${piece.score * 100}%"></span></span>
              </span>
            </div>
            ${colorizedArt ? `<pre class="piece-art">${colorizedArt}</pre>` : ''}
            <div class="piece-meta">
              <div class="metrics">
                <span class="metric">
                  <span class="metric-dot" style="background: ${metricColor(m.complexity || 0, 'complexity')}"></span>
                  complexity ${(m.complexity || 0).toFixed(2)}
                </span>
                <span class="metric">
                  <span class="metric-dot" style="background: ${metricColor(m.symmetry || 0, 'symmetry')}"></span>
                  symmetry ${((m.symmetry || 0) * 100).toFixed(0)}%
                </span>
                <span class="metric">
                  <span class="metric-dot" style="background: var(--accent)"></span>
                  density ${((m.density || 0) * 100).toFixed(0)}%
                </span>
                <span class="metric">
                  <span class="metric-dot" style="background: var(--amber)"></span>
                  novelty ${((m.novelty || 0) * 100).toFixed(0)}%
                </span>
              </div>
              <span>gen ${piece.generation} &bull; ${piece.genome.mutations}mut</span>
            </div>
          </div>
        `;
      });

      gallery.innerHTML = html;

      // Scroll-reveal with IntersectionObserver + typewriter animation
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            const card = entry.target;
            setTimeout(() => {
              card.classList.add('visible');
              // Trigger typewriter effect on the art
              const art = card.querySelector('.piece-art');
              if (art) {
                art.classList.add('animating');
                const lines = art.querySelectorAll('.art-line');
                lines.forEach((line, j) => {
                  setTimeout(() => line.classList.add('revealed'), j * 25);
                });
                // Mark done after all lines revealed
                setTimeout(() => {
                  art.classList.remove('animating');
                  art.classList.add('done');
                }, lines.length * 25 + 200);
              }
            }, i * 60);
            observer.unobserve(card);
          }
        });
      }, { threshold: 0.1 });

      gallery.querySelectorAll('.piece-card').forEach(card => observer.observe(card));
    }

    loadGallery();
  </script>
</body>
</html>
